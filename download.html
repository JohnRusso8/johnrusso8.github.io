<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Download Barchive Social</title>

  <script>
    const appStoreUrl = "https://apps.apple.com/us/app/barchive-social/id6742911751";
    const playStoreUrl = "https://play.google.com/store/apps/details?id=com.russo.barFriends&hl=en_US&pli=1";

    window.onload = function () {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;

      if (/android/i.test(userAgent)) {
        window.location.replace(playStoreUrl);
      } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        window.location.replace(appStoreUrl);
      }
    };
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #4a90e2, #50e3c2);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
    }

    .download-container {
      width: 95%;
      max-width: 520px;
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem 1.25rem;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
    }

    .app-logo {
      display: block;
      width: 150px;
      max-width: 100%;
      height: auto;
      margin: 0 auto 0.75rem;
    }

    h1 {
      font-weight: 700;
      font-size: 1.9rem;
      color: #2c3e50;
      margin: 0 0 0.75rem;
      text-align: center;
    }

    .subtitle {
      font-size: 1rem;
      line-height: 1.6;
      margin: 1rem auto 1.5rem;
      max-width: 430px;
      color: #555;
      text-align: center;
    }

    .store-buttons {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .store-buttons a {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      line-height: 0;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    .store-buttons a:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .store-badge {
      display: block;
      width: auto;
      height: auto;
      margin: 0 auto;
    }

    .app-store-badge {
      height: 47px;
    }

    .google-play-badge {
      height: 42px;
    }

    .small-note {
      margin: 1.5rem auto 0;
      font-size: 0.9rem;
      color: #7f8c8d;
      max-width: 400px;
    }

    .home-link {
      display: inline-block;
      margin-top: 1.25rem;
      color: #50e3c2;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .home-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 767px) {
      body {
        padding: 1rem;
      }

      .download-container {
        width: 95%;
        padding: 1.25rem;
      }

      .app-logo {
        width: 150px;
        margin: 0 auto 0.75rem;
      }

      h1 {
        font-size: 1.9rem;
      }

      .subtitle {
        font-size: 1rem;
      }

      .store-buttons {
        gap: 10px;
      }

      .app-store-badge {
        height: 47px;
      }

      .google-play-badge {
        height: 42px;
      }
    }

    @media (max-width: 380px) {
      .app-store-badge {
        height: 43px;
      }

      .google-play-badge {
        height: 38px;
      }
    }
  </style>
</head>

<body>
  <main class="download-container">
    <img src="logo.png" alt="Barchive Social Logo" class="app-logo" />

    <h1>Download Barchive</h1>

    <p class="subtitle">
      Discover bars, rate drinks, share your nights out, and see where the action is happening around you.
    </p>

    <div class="store-buttons">
      <a href="https://apps.apple.com/us/app/barchive-social/id6742911751" target="_blank" rel="noopener noreferrer">
        <img src="assets/download-app-store.png" alt="Download on the App Store" class="store-badge app-store-badge" />
      </a>

      <a href="https://play.google.com/store/apps/details?id=com.russo.barFriends&hl=en_US&pli=1" target="_blank" rel="noopener noreferrer">
        <img src="assets/google-play.png" alt="Get it on Google Play" class="store-badge google-play-badge" />
      </a>
    </div>

    <p class="small-note">
      If you are not redirected automatically, choose your store above.
    </p>

    <a href="index.html" class="home-link">Back to Barchive Social</a>
  </main>
</body>
</html>
